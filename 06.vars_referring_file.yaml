- name: variables from files
  hosts: local
  connection: local
  vars_files:
  - course.yaml
  tasks:
  - name: Print the course info
    ansible.builtin.debug:
      msg: "Course Name is: {{ Course }}, Duration: {{ Duration }}, Trainer: {{ Trainer }}"

